info:
  name: put /profile/me
  type: http
  seq: 3
  tags:
    - Profile

http:
  method: PUT
  url: "{{baseUrl}}/profile/me"
  body:
    type: json
    data: |-
      {
        "userId": "{{userId}}",
        "username": "{{username}}",
        "handle": "{{handle}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 Response
    description: No Content
    request:
      url: "{{baseUrl}}/profile/me"
      method: PUT
      body:
        type: json
        data: |-
          {
            "userId": "00000000-0000-0000-0000-000000000000",
            "username": "Test User",
            "handle": "test-user"
          }
    response:
      status: 204
      statusText: No Content
      body:
        type: text
        data: ""
