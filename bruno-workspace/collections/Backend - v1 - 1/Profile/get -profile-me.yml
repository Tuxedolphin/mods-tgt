info:
  name: get /profile/me
  type: http
  seq: 1
  tags:
    - Profile

http:
  method: GET
  url: "{{baseUrl}}/profile/me"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/profile/me"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "userId": "00000000-0000-0000-0000-000000000000",
            "username": "Test User",
            "handle": "test-user",
            "avatarUrl": "https://example.supabase.co/storage/v1/object/public/avatars/00000000-0000-0000-0000-000000000000/avatar.webp?v=0"
          }
