    description: OK
    request:
      url: "{{baseUrl}}/profile/avatar"
      method: PUT
      body:
        type: multipartForm
        multipartForm:
          - name: file
            type: file
            value: []
            enabled: true
    response:
      status: 200
      statusText: OK
      headers:
