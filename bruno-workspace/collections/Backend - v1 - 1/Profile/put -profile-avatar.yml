info:
  name: put /profile/avatar
  type: http
  seq: 4
  tags:
    - Profile

http:
  method: PUT
  url: "{{baseUrl}}/profile/avatar"
  body:
    type: multipartForm
    multipartForm:
      - name: file
        type: file
        value: []
        enabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
