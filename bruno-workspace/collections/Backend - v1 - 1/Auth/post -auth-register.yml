info:
  name: post /auth/register
  type: http
  seq: 1
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{password}}"
      }
  auth: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        if (
          res.getStatus() === 201 &&
          data.session?.accessToken &&
          data.session?.refreshToken
        ) {
          bru.setVar("accessToken", data.session.accessToken);
          bru.setVar("refreshToken", data.session.refreshToken);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Registered with session
    description: Account is ready immediately and includes a session.
    request:
      url: "{{baseUrl}}/auth/register"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "developer@example.invalid",
            "password": "Replace-with-a-secure-password-123!"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "requiresEmailConfirmation": false,
            "message": "Registration successful.",
            "session": {
              "accessToken": "eyJhbGciOiJIUzI1NiJ9.example-access-token",
              "refreshToken": "example-refresh-token",
              "expiresIn": 3600,
              "tokenType": "bearer"
            }
          }
  - name: 202 Email confirmation required
    description: Account was created but must be confirmed before login.
    request:
      url: "{{baseUrl}}/auth/register"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "developer@example.invalid",
            "password": "Replace-with-a-secure-password-123!"
          }
    response:
      status: 202
      statusText: Accepted
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "Registration successful. Please check your email to confirm your account."
          }
