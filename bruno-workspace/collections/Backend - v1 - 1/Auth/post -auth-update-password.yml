info:
  name: post /auth/update-password
  type: http
  seq: 8
  tags:
    - Auth

docs: Changes the authenticated user's password after verifying the current password.

http:
  method: POST
  url: "{{baseUrl}}/auth/update-password"
  auth: inherit
  body:
    type: json
    data: |-
      {
        "oldPassword": "{{currentPassword}}",
        "newPassword": "{{newPassword}}"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 Password updated
    description: The authenticated user's password was changed.
    request:
      url: "{{baseUrl}}/auth/update-password"
      method: POST
      body:
        type: json
        data: |-
          {
            "oldPassword": "Replace-with-a-secure-password-123!",
            "newPassword": "Replace-with-another-secure-password-456!"
          }
    response:
      status: 204
      statusText: No Content
