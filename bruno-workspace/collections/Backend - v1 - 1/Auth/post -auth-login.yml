info:
  name: post /auth/login
  type: http
  seq: 2
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{password}}"
      }
  auth: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        if (res.getStatus() === 200 && data.accessToken && data.refreshToken) {
          bru.setVar("accessToken", data.accessToken);
          bru.setVar("refreshToken", data.refreshToken);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Authenticated
    description: Returns a new access and refresh token pair.
    request:
      url: "{{baseUrl}}/auth/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "developer@example.invalid",
            "password": "Replace-with-a-secure-password-123!"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "accessToken": "eyJhbGciOiJIUzI1NiJ9.example-access-token",
            "refreshToken": "example-refresh-token",
            "expiresIn": 3600,
            "tokenType": "bearer"
          }
