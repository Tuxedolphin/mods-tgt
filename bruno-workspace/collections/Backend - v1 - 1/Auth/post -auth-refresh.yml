info:
  name: post /auth/refresh
  type: http
  seq: 3
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/auth/refresh"
  body:
    type: json
    data: |-
      {
        "refreshToken": "{{refreshToken}}"
      }

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:5233
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        bru.setEnvVar("accessToken", data.accessToken, { persist: false });
        bru.setEnvVar("refreshToken", data.refreshToken, { persist: false });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/auth/refresh"
      method: POST
      body:
        type: json
        data: |-
          {
            "refreshToken": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: text/plain
      body:
        type: text
        data: |-
          {
            "accessToken": "",
