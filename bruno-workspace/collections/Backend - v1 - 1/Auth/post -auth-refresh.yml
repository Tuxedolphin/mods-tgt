info:
  name: post /auth/refresh
  type: http
  seq: 3
  tags:
    - Auth

http:
  method: POST
  url: "{{baseUrl}}/auth/refresh"
  body:
    type: json
    data: |-
      {
        "refreshToken": "{{refreshToken}}"
      }
  auth: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        if (res.getStatus() === 200 && data.accessToken && data.refreshToken) {
          bru.setVar("accessToken", data.accessToken);
          bru.setVar("refreshToken", data.refreshToken);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Tokens refreshed
    description: Returns a rotated access and refresh token pair.
    request:
      url: "{{baseUrl}}/auth/refresh"
      method: POST
      body:
        type: json
        data: |-
          {
            "refreshToken": "example-refresh-token"
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "accessToken": "eyJhbGciOiJIUzI1NiJ9.rotated-access-token",
            "refreshToken": "rotated-refresh-token",
            "expiresIn": 3600,
            "tokenType": "bearer"
          }
