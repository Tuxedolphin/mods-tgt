info:
  name: post /timetable
  type: http
  seq: 1
  tags:
    - TimeTable

http:
  method: POST
  url: "{{baseUrl}}/timetable"
  body:
    type: json
    data: |-
      {
        "name": "test2",
        "semester": "2",
        "academicYear": "25-25",
        "metaData": [
          {
            "moduleCode": "1",
            "lessonNo": "2",
            "lessonType": "3"
          },
          {
            "moduleCode": "4",
            "lessonNo": "5",
            "lessonType": "6"
          }
        ]
      }
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:5233

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/timetable"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "semester": "",
            "academicYear": "",
            "metaData": [
              {
                "moduleCode": "",
                "lessonNo": "",
                "lessonType": ""
              }
            ]
          }
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
