info:
  name: put /timetable/:id
  type: http
  seq: 5
  tags:
    - Timetable

http:
  method: PUT
  url: "{{baseUrl}}/timetable/:id"
  params:
    - name: id
      value: "{{timetableId}}"
      type: path
  body:
    type: json
    data: |-
      {
        "name": "Updated Semester 1 Plan",
        "metaData": [
          {
            "moduleCode": "CS2103T",
            "lessonNo": "T02",
            "lessonType": "Tutorial",
            "colour": "#8B5CF6"
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 Timetable updated
    description: Replaces the timetable name and module metadata.
    request:
      url: "{{baseUrl}}/timetable/:id"
      method: PUT
      params:
        - name: id
          value: 2c1f2f7e-fcb6-4a8d-8465-cf6d924b6133
          type: path
      body:
        type: json
        data: |-
          {
            "name": "Updated Semester 1 Plan",
            "metaData": [
              {
                "moduleCode": "CS2103T",
                "lessonNo": "T02",
                "lessonType": "Tutorial",
                "colour": "#8B5CF6"
              }
            ]
          }
    response:
      status: 204
      statusText: No Content
