info:
  name: get /timetable/:id
  type: http
  seq: 4
  tags:
    - Timetable

http:
  method: GET
  url: "{{baseUrl}}/timetable/:id"
  params:
    - name: id
      value: "{{timetableId}}"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Timetable
    description: Returns one timetable owned by the authenticated user.
    request:
      url: "{{baseUrl}}/timetable/:id"
      method: GET
      params:
        - name: id
          value: 2c1f2f7e-fcb6-4a8d-8465-cf6d924b6133
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "2c1f2f7e-fcb6-4a8d-8465-cf6d924b6133",
            "name": "Semester 1 Plan",
            "semester": 1,
            "academicYear": "2026-2027",
            "createdAt": "2026-07-21T09:30:00Z",
            "metaData": [
              {
                "moduleCode": "CS2103T",
                "lessonNo": "T01",
                "lessonType": "Tutorial",
                "colour": "#3B82F6"
              },
              {
                "moduleCode": "CS2103T",
                "lessonNo": "L1",
                "lessonType": "Lecture",
                "colour": "#3B82F6"
              }
            ]
          }
