info:
  name: Get all information about a specific module
  type: http
  seq: 3
  tags:
    - Modules

http:
  method: GET
  url: "{{baseUrl}}/:acadYear/modules/{{moduleCode}}.json"
  params:
    - name: acadYear
      value: 2025-2026
      type: path
      description: academic year, with the slash (/) replaced by a dash
  auth: inherit

runtime:
  variables:
    - name: moduleCode
      value: CS2030S

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Success
    request:
      url: "{{baseUrl}}/:acadYear/modules/:moduleCode.json"
      method: GET
      params:
        - name: acadYear
          value: 2018-2019
          type: path
          description: academic year, with the slash (/) replaced by a dash
        - name: moduleCode
          value: CS1010S
          type: path
          description: module code
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "acadYear": "2018/2019",
            "preclusion": "CS1104 or Students from department of ECE",
            "description": "The objective of this module is to familiarise students with the fundamentals of computing devices. Through this module students will understand the basics of data representation, and how the various parts of a computer work, separately and with each other. This allows students to understand the issues in computing devices, and how these issues affect the implementation of solutions. Topics covered include data representation systems, combinational and sequential circuit design techniques, assembly language, processor execution cycles, pipelining, memory hierarchy and input/output systems.",
            "title": "Computer Organisation",
            "department": "Computer Science",
            "faculty": "Computing",
            "workload": "",
            "prerequisite": "CS1010 or its equivalent",
            "moduleCredit": "4",
            "moduleCode": "CS2100",
            "semesterData": [
              {
                "semester": 1,
                "examDate": "2018-11-27T09:00:00.000Z",
                "examDuration": 120,
                "timetable": [
                  {
                    "classNo": "08",
                    "startTime": "1100",
                    "endTime": "1200",
                    "weeks": "",
                    "venue": "COM1-0208",
                    "day": "Friday",
                    "lessonType": "Tutorial",
                    "size": 30
                  }
                ]
              }
            ],
            "prereqTree": {
              "and": [
                {
                  "or": [
                    "CS1010S",
                    "CS1010X"
                  ]
                },
                "CS1231"
              ]
            },
            "fulfillRequirements": [
              "CS2106",
              "CS3210"
            ]
          }
  - name: 404 Response
    description: Not found
    request:
      url: "{{baseUrl}}/:acadYear/modules/:moduleCode.json"
      method: GET
      params:
        - name: acadYear
          value: 2018-2019
          type: path
          description: academic year, with the slash (/) replaced by a dash
        - name: moduleCode
          value: CS1010S
          type: path
          description: module code
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""

docs: |
  Get all information available for a specific module including prerequite tree and timetable.

  NUSMods uses this on the module information page.
