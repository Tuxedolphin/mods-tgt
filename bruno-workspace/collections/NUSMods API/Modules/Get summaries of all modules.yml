info:
  name: Get summaries of all modules
  type: http
  seq: 1
  tags:
    - Modules

http:
  method: GET
  url: "{{baseUrl}}/:acadYear/moduleList.json"
  params:
    - name: acadYear
      value: 2018-2019
      type: path
      description: academic year, with the slash (/) replaced by a dash
  auth: inherit

runtime:
  variables:
    - name: baseUrl
      value: https://api.nusmods.com/v2

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Success
    request:
      url: "{{baseUrl}}/:acadYear/moduleList.json"
      method: GET
      params:
        - name: acadYear
          value: 2018-2019
          type: path
          description: academic year, with the slash (/) replaced by a dash
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "moduleCode": "EL1101E",
              "title": "The Nature of Language",
              "semesters": [
                1,
                2
              ]
            }
          ]
  - name: 404 Response
    description: Not found
    request:
      url: "{{baseUrl}}/:acadYear/moduleList.json"
      method: GET
      params:
        - name: acadYear
          value: 2018-2019
          type: path
          description: academic year, with the slash (/) replaced by a dash
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""

docs: |
  Get the module code, title and semesters which the module is available in for all modules in a year. This is useful for tasks that only require a minimal set of information, such as simple search, autocompleting module code and titles, and checking if a module code is valid.

  NUSMods uses this information to validate module codes and for searching.
