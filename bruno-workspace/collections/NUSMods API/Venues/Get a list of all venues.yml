info:
  name: Get a list of all venues
  type: http
  seq: 1
  tags:
    - Venues

http:
  method: GET
  url: "{{baseUrl}}/:acadYear/semesters/:semester/venues.json"
  params:
    - name: acadYear
      value: 2018-2019
      type: path
      description: academic year, with the slash (/) replaced by a dash
    - name: semester
      value: "1"
      type: path
      description: semester, with 1 and 2 representing semester 1 and 2, and 3, 4 representing special term 1 and 2
    - name: semester
      value: "2"
      type: path
      description: semester, with 1 and 2 representing semester 1 and 2, and 3, 4 representing special term 1 and 2
      disabled: true
    - name: semester
      value: "3"
      type: path
      description: semester, with 1 and 2 representing semester 1 and 2, and 3, 4 representing special term 1 and 2
      disabled: true
    - name: semester
      value: "4"
      type: path
      description: semester, with 1 and 2 representing semester 1 and 2, and 3, 4 representing special term 1 and 2
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Success
    request:
      url: "{{baseUrl}}/:acadYear/semesters/:semester/venues.json"
      method: GET
      params:
        - name: acadYear
          value: 2018-2019
          type: path
          description: academic year, with the slash (/) replaced by a dash
        - name: semester
          value: "1"
          type: path
          description: semester, with 1 and 2 representing semester 1 and 2, and 3, 4 representing special term 1 and 2
        - name: semester
          value: "2"
          type: path
          description: semester, with 1 and 2 representing semester 1 and 2, and 3, 4 representing special term 1 and 2
          disabled: true
        - name: semester
          value: "3"
          type: path
          description: semester, with 1 and 2 representing semester 1 and 2, and 3, 4 representing special term 1 and 2
          disabled: true
        - name: semester
          value: "4"
          type: path
          description: semester, with 1 and 2 representing semester 1 and 2, and 3, 4 representing special term 1 and 2
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            ""
          ]
  - name: 404 Response
    description: Not found
    request:
      url: "{{baseUrl}}/:acadYear/semesters/:semester/venues.json"
      method: GET
      params:
        - name: acadYear
          value: 2018-2019
          type: path
          description: academic year, with the slash (/) replaced by a dash
        - name: semester
          value: "1"
          type: path
          description: semester, with 1 and 2 representing semester 1 and 2, and 3, 4 representing special term 1 and 2
        - name: semester
          value: "2"
          type: path
          description: semester, with 1 and 2 representing semester 1 and 2, and 3, 4 representing special term 1 and 2
          disabled: true
        - name: semester
          value: "3"
          type: path
          description: semester, with 1 and 2 representing semester 1 and 2, and 3, 4 representing special term 1 and 2
          disabled: true
        - name: semester
          value: "4"
          type: path
          description: semester, with 1 and 2 representing semester 1 and 2, and 3, 4 representing special term 1 and 2
          disabled: true
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""

docs: |
  Get a list of all venues, including lecture theatres, seminar rooms, laboratories, etc. used in the given semester's classes. This endpoint only returns an array of names, and is useful for searching and autocompletion.
