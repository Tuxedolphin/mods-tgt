name: Deploy Application - Prod

on:
  push:
    branches: ["prod/**"]

env:
  PUBLIC_DB_LINK: ${{ vars.PUBLIC_DB_LINK }}
  BUILD_SHA: ${{ github.sha }}

jobs:
  backend-checks:
    uses: ./.github/workflows/build-test-dotnet.yml

  frontend-checks:
    uses: ./.github/workflows/build-test-sveltekit.yml

  deploy-backend:
    runs-on: ubuntu-latest
    needs:
      - backend-checks
      - frontend-checks
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore backend/Backend.csproj && dotnet restore backend.tests/Backend.Tests.csproj
      - name: Build
        run: dotnet build --no-restore backend/Backend.csproj && dotnet build --no-restore backend.tests/Backend.Tests.csproj
      - name: Publish
        run: dotnet publish -c Release backend/Backend.csproj
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app-artifacts
          path: ./backend/bin/Release/net10.0/publish/
          retention-days: 7
      - name: rsync deployments
        uses: burnett01/rsync-deployments@v9
        with:
          switches: -avzr --delete
          path: ./backend/bin/Release/net10.0/publish/
          remote_path: ${{ secrets.REMOTE_PATH }} # ex: /var/www/html/
          remote_host: ${{ secrets.REMOTE_HOST }} # ex: example.com
          remote_port: ${{ secrets.REMOTE_PORT }} # ex: 22
          remote_user: ${{ secrets.REMOTE_USER }} # ex: ubuntu
          remote_key: ${{ secrets.REMOTE_PRIVATE_KEY }}
      - name: Restart Mod-tgt Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.REMOTE_PRIVATE_KEY }}
          port: 22
          script: |
            echo ${{secrets.REMOTE_PSWD}} | sudo -S systemctl restart mod-tgt

  deploy-frontend:
    runs-on: ubuntu-latest
    needs:
      - backend-checks
      - frontend-checks
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Generate Wrangler Types
        run: pnpm wrangler types
        working-directory: frontend
      - name: Build
        run: pnpm build
        working-directory: frontend
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          workingDirectory: "frontend"
