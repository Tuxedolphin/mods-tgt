name: Deploy Application - Prod

on:
  push:
    branches: ["prod/**"]

env:
  PUBLIC_DB_LINK: ${{ vars.PUBLIC_DB_LINK }}
  BUILD_SHA: ${{ github.sha }}

jobs:
  backend-checks:
    uses: ./.github/workflows/build-test-dotnet.yml

  frontend-checks:
    uses: ./.github/workflows/build-test-sveltekit.yml

  on-success:
    runs-on: ubuntu-latest
    needs:
      - backend-checks
      - frontend-checks
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          package_json_file: frontend/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Generate Wrangler Types
        run: pnpm wrangler types
        working-directory: frontend
      - name: Build
        run: pnpm build
        working-directory: frontend
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          workingDirectory: "frontend"
