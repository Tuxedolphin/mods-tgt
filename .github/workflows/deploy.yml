name: Deploy Application - Prod

on:
  push:
    branches: ["prod/**"]

jobs:
  backend-checks:
    uses: ./.github/workflows/build-test-dotnet.yml

  frontend-checks:
    uses: ./.github/workflows/build-test-sveltekit.yml

  on-success:
    runs-on: ubuntu-latest
    needs:
      - backend-checks
      - frontend-checks
    steps:
      - uses: actions/checkout@v6
      - name: Build & Deploy Worker
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          workingDirectory: "frontend"
