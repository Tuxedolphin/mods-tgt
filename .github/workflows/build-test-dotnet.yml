# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Build / Test

on:
  workflow_call:

jobs:
  dotnet-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore backend/Backend.csproj && dotnet restore backend.tests/Backend.Tests.csproj
      - name: Build
        run: dotnet build --no-restore backend/Backend.csproj && dotnet build --no-restore backend.tests/Backend.Tests.csproj
      - name: Test
        run: dotnet test --no-build --verbosity normal
        working-directory: backend.tests
